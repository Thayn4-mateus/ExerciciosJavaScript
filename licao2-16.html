<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media da soma da idade</title>
</head>
<body>
    
    <h1>Média da idade de 20 pessoas</h1>
    
    <script>
    let ida1 = parseInt(prompt("Idade da 1° pessoa:"))
    let ida2 = parseInt(prompt("Idade da 2° pessoa:"))
    let ida3 = parseInt(prompt("Idade da 3° pessoa:"))
    let ida4 = parseInt(prompt("Idade da 4° pessoa:"))
    let ida5 = parseInt(prompt("Idade da 5° pessoa:"))
    let ida6 = parseInt(prompt("Idade da 6° pessoa:"))
    let ida7 = parseInt(prompt("Idade da 7° pessoa:"))
    let ida8 = parseInt(prompt("Idade da 8° pessoa:"))
    let ida9 = parseInt(prompt("Idade da 9° pessoa:"))
    let ida10 = parseInt(prompt("Idade da 10° pessoa:"))
    let ida11 = parseInt(prompt("Idade da 11° pessoa:"))
    let ida12 = parseInt(prompt("Idade da 12° pessoa:"))
    let ida13 = parseInt(prompt("Idade da 13° pessoa:"))
    let ida14 = parseInt(prompt("Idade da 14° pessoa:"))
    let ida15 = parseInt(prompt("Idade da 15° pessoa:"))
    let ida16 = parseInt(prompt("Idade da 16° pessoa:"))
    let ida17 = parseInt(prompt("Idade da 17° pessoa:"))
    let ida18 = parseInt(prompt("Idade da 18° pessoa:"))
    let ida19 = parseInt(prompt("Idade da 19° pessoa:"))
    let ida20 = parseInt(prompt("Idade da 20° pessoa:"))

    let somaTotal = (ida1 + ida2 + ida3 + ida4 + ida5 + ida6 + ida7 + ida8 + ida9 + ida10 + ida11 + ida12 + ida13 + ida14 + ida15 + ida16 + ida17 + ida18 + ida19 + ida20) /20;

    document.write("A soma das 20 idades é: " + somaTotal);
    </script>
</body>
</html>
