<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma dos numeros 1 a o 15</title>
</head>
<body>
    <h1>Soma dos numeros 1 a o 15</h1>

    <script> 
        let primeiro = 1;
        let ultimo = 15;
        let n = 15

        let soma = ((primeiro + ultimo) * n) / 2;
        document.write("A soma de 1 a 15 é: " + soma);
</script>
    </script>
</body>
</html>
