<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Celcius para Fahrenheit</title>
</head>
<body>
    <h1>Celcius para Fahrenheit</h1>

    <script>
        let c = parseFloat(prompt("Adicione a temperatura: "))
        document.write("Temperatura em "+ c+ "°C")
        let soma = (9*c+160)/5
        document.write("<br>Temperarura em "+soma+ "°F")

    </script>
</body>
</html>
