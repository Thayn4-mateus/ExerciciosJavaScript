<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamão com Açúcar</title>
</head>
<body>
    <h1>Prestação dos protudos </h1>

    <script>
        let produto = parseInt(prompt("Informe o valor do protudo: "))
        let soma = produto/5

        document.write("Valor do produto: R$ " + produto.toFixed(2))
        document.write("<br><br>Primeira parcela: R$ " + soma.toFixed(2))
        document.write("<br>Segunda parcela: R$ " + soma.toFixed(2))
        document.write("<br>Terceira parcela: R$ " + soma.toFixed(2))
        document.write("<br>Quarta parcela: R$ " + soma.toFixed(2))
        document.write("<br>Quinta parcela: R$ " + soma.toFixed(2))

    </script>
</body>
</html>
