<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Aritmética Dos Numero Entre 15 e 100</title>
</head>
<body>
    <h1>Média Aritmética Dos Numero Entre 15 e 100</h1>

    <script>
        let soma = 0;
        let n = 15;

        while (n <= 100) {
            soma = soma + n;
            n++;
        }

        let media = soma / 86;

        document.write("Média: " + media);

    </script>
    
</body>
</html>
