<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio 1</h1>

    <script>
        let num = parseFloat(prompt("Digite o primeiro numero: "));
        let num1 = parseFloat(prompt("Digite o segundo numero: "));

        while (num1 <= 0) {
            alert("Número inválido! Digite novamente.");
            num1 = parseFloat(prompt("Digite o segundo numero: "));
        }

        let resultado = num / num1;

        document.write("Resultado é: " + resultado);
        
    </script>
    
</body>
</html>
