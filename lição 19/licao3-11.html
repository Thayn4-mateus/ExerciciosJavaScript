<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros entre 24 e 42</title>
</head>
<body>
    <h1>Numeros entre 24 e 42</h1>
    
    <script>
    
        let dentro = 0;
        let fora = 0;
        let i = 1;

        while (i <= 10) {
            let num = parseFloat(prompt("Digite um número:"));

            if (num >= 24 && num <= 42) {
                dentro++;
            } else {
                fora++;
            }i++;
        }

        document.write("Dentro do intervalo: " + dentro + "<br>");
        document.write("Fora do intervalo: " + fora);
    </script>

    
</body>
</html>
