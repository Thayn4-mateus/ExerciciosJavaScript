<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let Num = parseInt(prompt("Digite um número: "));

        let um = 1;

        while (um <= Num) {
            document.write(um + "<br>");
            um++;}

    </script>
    
</body>
</html>
