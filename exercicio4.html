<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorimo do IPI</title>
</head>
<body>
    <script>
        let ipi = 15

        let quant = 10
        let quant1 = 15

        let valor = 500
        let valor1 = 170

        let soma = (valor*quant + valor1*quant1)*(ipi/100 + 1)

        document.write("Valor total a ser paga: " + soma)
        
        console.log("Valor total a ser paga: " + soma)

    </script>
</body>
</html>
