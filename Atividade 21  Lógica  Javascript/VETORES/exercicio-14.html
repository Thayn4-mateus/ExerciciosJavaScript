<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetores 14</title>
</head>

<body>
    <!-- 14) Escreva um programa que leia 7 números inteiros e exiba apenas os números pares. -->
    <h1>Exibir pares</h1>

    <script>
        const numeros = [];

        for (let i = 1; i <= 7; i++) {
            const n = parseInt(prompt("Digite o " + i + "° número:"));
            numeros.push(n);
        }

        numeros.forEach(n => {
            if (n % 2 === 0) {
                document.write(n + "<br>");  
            }
        });
    </script>
</body>

</html>
