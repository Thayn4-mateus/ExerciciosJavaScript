<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetores 12</title>
</head>

<body>
    <!-- 12) Crie um programa que leia 5 números inteiros e exiba-os em ordem decrescente. -->
    <h1>Ordem decrescente</h1>

    <script>
        const numeros = [];

        for (let i = 1; i <= 5; i++) {
            const n = parseInt(prompt("Digite o " + i + "° número:"));
            numeros.push(n);
        }

        numeros.sort((b, a) => b - a);
        document.write(numeros.join(", "))
    </script>

</body>

</html>
