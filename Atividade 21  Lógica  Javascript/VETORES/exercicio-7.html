<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetores 7</title>
</head>

<body>
    <!-- 07) Faça um programa que leia 10 números inteiros e exiba quantos deles são positivos.-->
    <h1>Contagem de positivos</h1>

    <script>
        const numeros = [];

        for (let i = 1; i <= 10; i++) {
            const n = parseInt(prompt("Digite o " + i + "° número:"));
            numeros.push(n);
        }

        let cont= 0;

        numeros.forEach(n => {
            if (n > 0) cont++;
        });

        document.write("Positivos: " + cont);

    </script>

</body>

</html>
