<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetores 4</title>
</head>

<body>
    <!-- 04) Faça um programa que leia 5 números inteiros e exiba quantos deles são pares. -->

    <h1>Contagem de pares</h1>

    <script>

        const numeros = [];

        for (let i = 1; i <= 5; i++) {
            const n = parseInt(prompt("Digite o " + i + "° número:"));
            numeros.push(n);
        }

        let cont = 0;

        numeros.forEach(n => {
            if (n % 2 === 0) {
                cont++;
            }
        });

        document.write("Pares: " + cont);
    </script>

</body>

</html>
