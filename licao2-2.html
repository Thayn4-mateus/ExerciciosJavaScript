<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisíveis por 10, 5 e 2</title>
</head>
<body>
    <h1>Numeros divisíveis por 2, 5 e 10</h1>

    <script>
        let adiNum = prompt("Digite um número")
        document.write("Seu numero é: " + adiNum)

        if (adiNum % 10 === 0){
            document.write("<br>É esse numero é divisivél por 10")
        }
         if (adiNum % 5 === 0){
            document.write("<br>É esse numero é divisivél por 5")
         }
         if (adiNum % 2 === 0){
            document.write("<br>É esse numero é divisivél por 2")
         }
         else{
            document.write("<br>esse numero não é divisivél ")
         }
        



    </script>
    
</body>
</html>
