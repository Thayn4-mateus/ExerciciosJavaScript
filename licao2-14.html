<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma de 10 numeros</title>
</head>
<body>
    <h1>Soma de 10 numeros</h1>

    <script>
        let n1= parseFloat(prompt("digite o primeiro numero"))
        let n2= parseFloat(prompt("digite o segundo nume(ro"))
        let n3= parseFloat(prompt("digite o terceiro numero"))
        let n4= parseFloat(prompt("digite o quarto numero"))
        let n5= parseFloat(prompt("digite o quinto numero"))
        let n6= parseFloat(prompt("digite o sexto numero"))
        let n7= parseFloat(prompt("digite o sétimo numero"))
        let n8= parseFloat(prompt("digite o oitavo numero"))
        let n9= parseFloat(prompt("digite o nono numero"))
        let n10= parseFloat(prompt("digite o décimo numero"))

        document.write("1° "+n1)
        document.write("<br>2° "+n2)
        document.write("<br>3° "+n3)
        document.write("<br>4° "+n4)
        document.write("<br>5° "+n5)
        document.write("<br>6° "+n6)
        document.write("<br>7° "+n7)
        document.write("<br>8° "+n8)
        document.write("<br>9° "+n9)
        document.write("<br>10° "+n10)


        let soma= n1+n2+n3+n4+n5+n6+n7+n8+n9+n10;        
        document.write("<br>A soma dos numeros: "+soma)
    </script> 
</body>
</html>
