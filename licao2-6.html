<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros antecessores e seu sucessores</title>
</head>
<body>
    <script>
        let soma = prompt("coloque o numero")
        document.write("Seu numero: "+ soma)
        
        let antecessor = soma- 1
        document.write("numero antecessor: " + antecessor)

        let sucessor = Number(soma)+1
        document.write("<br>numero sucessor: " + sucessor)
    </script>
</body>
</html>
