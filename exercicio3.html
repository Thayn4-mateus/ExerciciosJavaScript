<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informação do saldo</title>
</head>
<body>
    <script>
        let saldo = 10.500
        let percentual = 1 

        let reajuste = saldo + (saldo * percentual/ 100)

        document.write("Reajuste do salario: " + reajuste)
        
        console.log("Reajuste do salario: " + reajuste)

    </script>

</body>
</html>
