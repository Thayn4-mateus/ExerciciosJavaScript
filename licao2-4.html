<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros Descendente </title>
</head>
<body>
    <h1>Numeros Descendente</h1>
  
  <script>
    let a = parseInt(prompt("Escreva o primeiro número: "))
    let b = parseInt(prompt("Escreva o segundo número: "))
    let c = parseInt(prompt("Escreva o terceiro número: "))


    if (a >= b && a >= c && b >= c) {
        document.write("A ordem decrescente é: " + a + ", " + b + " e " + c);
    } 
    else if (a >= b && a >= c && c >= b) {
        document.write("A ordem decrescente é: " + a + ", " + c + " e " + b);
    } 
    else if (b >= a && b >= c && a >= c) {
        document.write("A ordem decrescente é: " + b + ", " + a + " e " + c);
    } 
    else if (b >= a && b >= c && c >= a) {
        document.write("A ordem decrescente é: " + b + ", " + c + " e " + a);
    } 
    else if (c >= a && c >= b && a >= b) {
        document.write("A ordem decrescente é: " + c + ", " + a + " e " + b);
    } 
    else if (c >= a && c >= b && b >= a) {
        document.write("A ordem decrescente é: " + c + ", " + b + " e " + a);
    }
</script>
    
</body>
</html>
