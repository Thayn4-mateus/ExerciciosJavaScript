<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Aritmérica</title>
</head>
<body>
    <h1>Média Aritmérica</h1>

    <script>
        let soma= 0;
        let n= 1;

        do{
            n++
            let i= parseInt(prompt("Digite sua idade"));
            soma=soma+i

        }while(n <= 5);

        let media = soma/5;

        document.write("A média das idades são: "+ media
        )
    </script>
</body>
</html>
