<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>números ímpares de 1 a 50</title>
</head>
<body>
    <h1>números ímpares de 1 a 50</h1>
    <!-- 27) Crie um programa que exiba os números ímpares de 1 a 50 usando o loop "do-while". -->

    <script>

        let n= 1;

        do{
            n=n+2
            document.write(n +" ,")

        }while(n<=50);

        
    </script>
</body>
</html>
