<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <!-- 20) Escreva um programa que leia um número inteiro e exiba a tabuada desse número até o décimo valor usando o loop "do-while -->

    <h1>Tabuada</h1>

    <script>
        let n = parseInt(prompt("Digite o numero:")); 
        let tab = 1;

        do{
            tab++;
            document.write(n + " X " + tab + " = " + (n * tab) + "<br>");
        }while(tab <= 10);

    </script>
    
</body>
</html>
