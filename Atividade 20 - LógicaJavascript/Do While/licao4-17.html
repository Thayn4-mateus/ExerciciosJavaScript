<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma dos numeros 1 até 100</title>
</head>
<body>
    <h1>Soma dos numeros 1 até 100</h1>

    <script>
        let n= 1;
        let soma =0;

        do{
            soma= n +soma
            n++
        }while(n <=100);

        document.write("A soma entre os numeros 1 a 100: "+ soma);
    </script>
    
</body>
</html>
