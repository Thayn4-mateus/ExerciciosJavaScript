<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros Pares entre 1 e 50</title>
</head>
<body>

    <h1>Numeros Pares entre 1 e 50</h1>
    <script>
        let n = 0;
         do{
            n +=1;
            n++
        document.write(n + "<br>") 
         }while(n<=49);


    </script>
    
</body>
</html>
