<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci</title>
</head>

<body>
    <h1>Fibonacci</h1>

    <script>
        let n = parseInt(prompt("Digite um numero: "));
        let n1 = 0;
        let n2 = 1;

        do{
            document.write(n1 + ", ");

            let soma = n1 + n2;
            n1 = n2;
            n2 = soma;
        }while( n1 <= n);

    </script>

</body>

</html>
