<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros Pares</title>
</head>
<body>
    <h1>Numeros Pares</h1>

    <script>
        let n = 2;

        while (n <= 50) {
            document.write(n + "<br>");
            n = n + 2;
        }
    </script>
    
</body>
</html>
