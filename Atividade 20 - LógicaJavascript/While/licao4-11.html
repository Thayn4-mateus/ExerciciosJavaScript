<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1></h1>

    <script>
        let num = parseInt(prompt("Digite um número:"));

        let con = 2;
        let soma = 0;

        while (con <= num) {
            soma = soma + con;
            con += 2;
        }

        document.write("Soma dos pares: " + soma);
        
    </script>
    
</body>
</html>
