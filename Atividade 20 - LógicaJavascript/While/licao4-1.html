<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Usando o while</title>
</head>
<body>
    <h1>Loop Usando o while</h1>

    <script>

        let n= 1;

        while(n <=10){
            document.write(n +"<br>");
            n++;
        }
    </script>
    
</body>
</html>
