<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop 1 a 50</title>
</head>
<body>
    <h1>Loop 1 a 50</h1>

    <script>
        let n= 1;

        while(n <=50){
            document.write(n +"<br>");
            n=  n +2;
        }
    </script>
</body>
</html>
