<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisores de Numeros Inteiro</title>
</head>
<body>
    <h1>Divisores de numeros inteiro</h1>
    
    <script>
        let n= parseInt(prompt("Digite um numero: "));

        let div= 1;

        while(div<=n){
            if (n % div == 0) {
                document.write(div + "<br>");
            }
            div++;

        }
    </script>
</body>
</html>
