<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Até 20 Numeros</title>
</head>
<body>

    <h1>Fibonacci Até 20 Numeros</h1>

    <script>
        let n1 = 0;
        let n2 = 1;
        let i = 1;

        while (i <= 20) {
            document.write(n1 + ", ");

            let soma = n1 + n2;
            n1 = n2;
            n2 = soma;

            i++;
        }
    </script>
    
</body>
</html>
