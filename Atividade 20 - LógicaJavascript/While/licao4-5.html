<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <h1>Tabuada</h1>

    <script>
        let tabuada= prompt("Coloque um numero aqui:")
        let n=1

        do{
            document.write( tabuada +"X"+ n + "= "+ tabuada*n + "<br>")
            n++
        }while(n<=10)
    </script>
    
</body>
</html>
