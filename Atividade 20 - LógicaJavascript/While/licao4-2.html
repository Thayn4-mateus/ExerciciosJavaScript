<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma dos Numeros</title>
</head>
<body>

    <h1>Soma dos numeros</h1>

    <script>

        let n= 1;
        let soma=0;

        while(n<=100){
            soma = soma + n;
            n++;
        }

            document.write("A soma: "+soma);
    </script>
    
</body>
</html>
