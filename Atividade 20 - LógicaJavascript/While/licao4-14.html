<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatorial</title>
</head>
<body>
    <h1>Fatorial</h1>

    <script>
        let n = parseInt(prompt("Digite um número:"));
        let um= 1;

        while(n>0){
            um= um*n
            n--;

        }
        
        document.write("O fatorial é: "+ um)
    </script>
    
</body>
</html>
