<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1></h1>

    <script>
        let num = parseInt(prompt("Digite um número:"));

        while (num > 0) {
            let digito = num % 10;
            document.write(digito + "<br>");

            num = parseInt(num / 10);
        }
    </script>
</body>
</html>
