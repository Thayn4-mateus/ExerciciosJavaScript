<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <h1>Tabuada</h1>
    
    <script>
    let n = parseInt(prompt("Digite o numero:"));

    for (let tab = 1; tab <= 10; tab++) {
        document.write(n + " X " + tab + " = " + (n * tab) + "<br>");
    }
    </script>
    
</body>
</html>
