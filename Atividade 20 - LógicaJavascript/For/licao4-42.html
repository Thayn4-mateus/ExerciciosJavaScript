<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>números ímpares de 1 a 50</title>
</head>
<body>
    <h1>números ímpares de 1 a 50</h1>
    <script>
        for(let n=1; n <=50; n=n+2){
            document.write(n +"<br>");
        }
    </script>
    
</body>
</html>
