<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Aritmérica</title>
</head>
<body>

    <h1>Média aritmérica</h1>

    <script>
        let soma = 0;

        for (let num = 1; num <= 5; num++){
            let incl = parseInt(prompt("digite o "+ num + " numero"));

            soma= soma + incl;
        }

        let media= soma/5;

        document.write("A média aritimédica dos numeros é: " + media)

    </script>


</body>
</html>
