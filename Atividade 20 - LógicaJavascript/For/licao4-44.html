<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatorial</title>
</head>

<body>
    <h1>Fatorial</h1>

    <script>
        let um = 1;

        for (let n = parseInt(prompt("Digite um numero: ")); n > 0; n--) {
            um = um * n
        }
        document.write("O fatorial é: " + um)  
    </script>

</body>

</html>
