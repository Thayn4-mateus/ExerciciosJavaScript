<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros Pares de 1 até 50</title>
</head>
<body>
    <h1>Numeros pares de 1 até 50</h1>

    <script>

        for( let num= 0; num <=49;num += 1){
            num++;

            document.write(num +"<br>")

        }

    </script>
    
</body>
</html>
