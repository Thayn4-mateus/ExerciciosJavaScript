<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisores de Numero Inteiro</title>
</head>
<body>
    <h1>Divisores de numero inteiro</h1>

    <script>
        let n= parseInt(prompt("Digite um numero: "));

        for(let div= 1;div<=n; div++){
            if (n % div == 0) {
                document.write(div + "<br>");
            }
    
        }
    </script>
    
</body>
</html>
