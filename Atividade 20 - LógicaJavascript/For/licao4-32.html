<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma dos Numeros 1 até 100</title>
</head>
<body>
    <h1>Soma dos numeros 1 até 100</h1>

    <script>
        let soma= 0

        for(let num= 1; num <= 100; num++){

            soma= soma + num
        }
    
        document.write("A soma entre os numeros 1 a 100: "+ soma)
    </script>
    
</body>
</html>
